version: 1

shell:
  allowed_programs:
    - go
    - npm
    - npx
    - node
    - yarn
    - pnpm
    - git
    - gh
    - cargo
    - rustc
    - rg
    - bazel
    - curl
    - buf
  default_timeout: "60s"
  max_timeout: "300s"
  max_output_bytes: 262144

curl:
  url_prefixes:
    - https://raw.githubusercontent.com/bazelbuild/bazel-central-registry/
    - https://registry.bazel.build/
    - https://buf.build/
    - https://api.github.com/repos/
    - https://crates.io/api/
