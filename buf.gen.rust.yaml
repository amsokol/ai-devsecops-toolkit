  # depbot: keep in lockstep with Cargo.toml buffa — bump remote to v0.9.0 only when
  # the crates.io/GitHub buffa v0.9.0 release and this BSR plugin tag are both available.
  - remote: buf.build/anthropics/buffa:v0.8.1
