[workspace]
resolver = "2"
members = [
    "rust/api",
    "rust/ai-agent-kit",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.97.1"
publish = false

[workspace.dependencies]
api = { path = "rust/api" }
buffa = { version = "=0.8.1", default-features = false, features = [
    "std",
    "fast-utf8",
    "json",
] }
serde = { version = "1.0.229", default-features = false, features = [
    "derive",
    "std",
] }
tempfile = "3.27.0"
thiserror = "2.0.19"
